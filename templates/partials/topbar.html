<header class="topbar"><button class="icon-btn menu-btn" id="menuButton" aria-label="Open menu">☰</button><div><p class="eyebrow">Operations console</p><h1>{% block page_title %}AgentPulse AI{% endblock %}</h1></div><div class="top-actions"><a class="icon-btn notification-link" href="{% url 'alerts:alert_list' %}" aria-label="Alerts"><span aria-hidden="true">🔔</span>{% if unread_alert_count %}<span class="notification-badge">{{ unread_alert_count }}</span>{% endif %}</a><div class="user-menu"><button class="user-button" data-dropdown-toggle><span class="avatar">{{ user.username|first|upper }}</span><span class="user-copy"><strong>{{ user.get_full_name|default:user.username }}</strong><small>{{ user.email|default:'Team member' }}</small></span><span>⌄</span></button><div class="dropdown"><a href="{% url 'accounts:profile' %}">Profile</a><a href="{% url 'accounts:settings' %}">Settings</a><a href="{% url 'password_change' %}">Change password</a><form method="post" action="{% url 'logout' %}">{% csrf_token %}<button type="submit">Sign out</button></form></div></div></div></header>
