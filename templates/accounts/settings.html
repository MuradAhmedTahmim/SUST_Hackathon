{% extends 'base.html' %}{% block title %}Settings{% endblock %}{% block page_title %}Settings{% endblock %}{% block content %}<section class="panel narrow"><div class="panel-head"><div><p class="eyebrow">Preferences</p><h2>Account settings</h2></div></div><form method="post" class="stack-form">{% csrf_token %}<label>Preferred language<select name="preferred_language"><option value="EN" {% if profile.preferred_language == 'EN' %}selected{% endif %}>English</option><option value="BN" {% if profile.preferred_language == 'BN' %}selected{% endif %}>Bengali</option></select></label><label class="switch-row"><span><strong>Critical alert notifications</strong><small>Receive notifications for critical liquidity and anomaly alerts.</small></span><input type="checkbox" name="receive_critical_alerts" {% if profile.receive_critical_alerts %}checked{% endif %}></label><button class="btn btn-primary">Save settings</button></form><hr><a class="text-link" href="{% url 'password_change' %}">Change password →</a></section>{% endblock %}
