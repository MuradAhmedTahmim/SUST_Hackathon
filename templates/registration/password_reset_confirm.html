{% extends 'base.html' %}{% load static %}{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}">{% endblock %}{% block auth_content %}<div class="auth-card"><h1>Choose a new password</h1>{% if validlink %}<form method="post" class="stack-form">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary full">Update password</button></form>{% else %}<div class="message error">This password-reset link is invalid or has expired.</div><a class="btn btn-primary full" href="{% url 'password_reset' %}">Request a new link</a>{% endif %}</div>{% endblock %}
